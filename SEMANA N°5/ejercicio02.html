<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condicionales</title>
</head>
<body>
    <script>
        let edad = parseInt(prompt("Ingrese su edad:"));
        if (edad<12){
            document.write("<h3>Usted es un niño.</h3>");
        } else if (edad < 18){
            document.write("<h3>Usted es un adolescente.</h3>");
        } else if(edad < 60){
            document.write("<h3>Usted es un adulto joven.</h3>");
        } else {
            document.write("<h3>Usted ya esta para la tumba.</h3>");
        }
        
    </script>
</body>
</html>
